    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARM BET</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #121212;
            --border: #1f1f1f;
            --text: #ffffff;
            --text-muted: #8a8a8a;
            --accent: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
        .balance { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
        .nav { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
        .nav-btn {
            padding: 12px 20px; background: none; border: none; color: var(--text-muted);
            font-size: 14px; font-weight: 500; cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.2s;
        }
        .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .match-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 16px;
        }
        .match-header {
            font-size: 11px; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 16px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .live-badge { color: #ff4444; font-weight: 700; }
        .match-teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .team { font-size: 16px; font-weight: 700; }
        .vs { font-size: 12px; color: var(--text-muted); }
        .odds-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .odds-btn {
            background: var(--card-bg); border: 1px solid var(--border);
            color: var(--text); padding: 16px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }
        .odds-btn:hover { border-color: var(--accent); background: var(--border); }
        .odds-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .odds-value { font-size: 20px; font-weight: 700; }
        .distribution { font-size: 11px; color: var(--text-muted); margin-top: 12px; }
        .distribution-bar {
            height: 4px; background: var(--border); border-radius: 2px;
            overflow: hidden; margin: 8px 0;
        }
        .distribution-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px;
            align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; width: 100%; max-width: 400px;
        }
        .modal-header { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-label {
            font-size: 12px; color: var(--text-muted);
            margin-bottom: 8px; display: block;
        }
        .input {
            width: 100%; padding: 16px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 16px;
            font-family: 'JetBrains Mono', monospace;
        }
        .btn {
            width: 100%; padding: 16px; background: var(--accent);
            color: var(--bg); border: none; border-radius: 8px;
            font-size: 16px; font-weight: 700; cursor: pointer;
        }
        .btn-secondary {
            background: transparent; border: 1px solid var(--border);
            color: var(--text); margin-top: 12px;
        }
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-muted);
        }
        .bet-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px; margin-bottom: 12px;
        }
        .bet-header {
            display: flex; justify-content: space-between; margin-bottom: 8px;
        }
        .bet-status {
            font-size: 11px; padding: 4px 8px; border-radius: 4px;
            text-transform: uppercase; font-weight: 700;
        }
        .bet-status.active { background: #1a4d2e; color: #4ade80; }
        .bet-status.won { background: #1a4d2e; color: #4ade80; }
        .bet-status.lost { background: #4d1a1a; color: #ff6b6b; }
        .leader-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .leader-rank {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px; font-weight: 700;
            color: var(--text-muted); width: 40px;
        }
        .leader-name { font-weight: 700; }
        .leader-balance {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px; font-weight: 700;
        }
    </style>
</head>

            setupEventListeners();
        }
        
        function updateBalance() {
            // Ищем себя в лидерах по Telegram user_id
            const myData = leaderboardData.find(p => p.user_id === user.id);
            
            const balance = myData ? myData.balance : 500;
            document.getElementById('userBalance').textContent = balance;
        }
        
        function getMyBalance() {
            // Получить актуальный баланс по user_id
            const myData = leaderboardData.find(p => p.user_id === user.id);
            return myData ? myData.balance : 500;
        }
        
        function getMyData() {
            // Получить все данные текущего пользователя
            return leaderboardData.find(p => p.user_id === user.id) || {
                balance: 500,
                bets: 0,
                rank: '—'
            };
        }

        function setupEventListeners() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderView(btn.dataset.view);
                });
            });
        }

        function renderView(view) {
            const content = document.getElementById('content');
            switch(view) {
                case 'matches':
                    content.innerHTML = renderMatches();
                    break;
                case 'bets':
                    content.innerHTML = renderMyBets();
                    break;
                case 'leaderboard':
                    content.innerHTML = renderLeaderboard();
                    break;
                case 'profile':
                    content.innerHTML = renderProfile();
                    break;
            }
        }

        function renderMatches() {
            if (!matchesData || matchesData.length === 0) {
                return '<div class="empty-state"><div class="empty-text">Нет доступных матчей</div></div>';
            }
            
            return matchesData.map(match => `
                <div class="match-card">
                    <div class="match-header">
                        <span>${match.league}</span>
                        ${match.status === 'live' ? '<span class="live-badge">● В ЭФИРЕ</span>' : ''}
                    </div>
                    <div class="match-teams">
                        <div class="team">${match.team1.emoji} ${match.team1.name}</div>
                        <div class="vs">VS</div>
                        <div class="team">${match.team2.emoji} ${match.team2.name}</div>
                    </div>
                    <div class="odds-row">
                        <button class="odds-btn" onclick="openBetModal(${match.match_id}, ${match.team1.team_id}, '${match.team1.emoji} ${match.team1.name}', ${match.odds1})">
                            <div class="odds-label">W1</div>
                            <div class="odds-value">${match.odds1}</div>
                        </button>
                        <button class="odds-btn" onclick="openBetModal(${match.match_id}, ${match.team2.team_id}, '${match.team2.emoji} ${match.team2.name}', ${match.odds2})">
                            <div class="odds-label">W2</div>
                            <div class="odds-value">${match.odds2}</div>
                        </button>
                    </div>
                    <div style="font-size: 10px; color: var(--text-muted); text-align: center; margin: 8px 0;">
                        ⚠️ Коэффициенты обновляются каждые 5 мин. При ставке фиксируется текущий коэф.
                    </div>
                    <div class="distribution">РАСПРЕДЕЛЕНИЕ</div>
                    <div class="distribution-bar">
                        <div class="distribution-fill" style="width: ${match.bet_distribution.team1}%"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted);">
                        <span>${match.bet_distribution.team1}%</span>
                        <span>${match.bet_distribution.team2}%</span>
                    </div>
                </div>
            `).join('');
        }

        function renderMyBets() {
            // Фильтруем ставки текущего пользователя по user_id
            const myBetsData = allBetsData.filter(bet => bet.user_id === user.id);
            
            if (!myBetsData || myBetsData.length === 0) {
                return '<div class="empty-state"><div class="empty-text">У вас пока нет ставок</div></div>';
            }
            
            return myBetsData.map(bet => `
                <div class="bet-card">
                    <div class="bet-header">
                        <div>
                            <div style="font-weight: 700; margin-bottom: 4px;">${bet.team}</div>
                            <div style="font-size: 12px; color: var(--text-muted);">Матч #${bet.match_id}</div>
                        </div>
                        <span class="bet-status ${bet.status}">${bet.status === 'active' ? 'Активна' : bet.status === 'won' ? 'Выигрыш' : 'Проигрыш'}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 12px; font-family: 'JetBrains Mono', monospace;">
                        <span>Ставка: ${bet.amount}</span>
                        <span>К: x${bet.odds}</span>
                        <span>Выигрыш: ${Math.round(bet.amount * bet.odds)}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderLeaderboard() {
            if (!leaderboardData || leaderboardData.length === 0) {
                return '<div class="empty-state"><div class="empty-text">Таблица лидеров пуста</div></div>';
            }
            
            // Показываем только топ-10
            const top10 = leaderboardData.slice(0, 10);
            
            return top10.map(player => `
                <div class="leader-card" style="${player.username === user.first_name || player.username === user.username ? 'border: 2px solid var(--accent);' : ''}">
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div class="leader-rank">${player.rank}</div>
                        <div>
                            <div class="leader-name">${player.username}</div>
                            <div style="font-size: 12px; color: var(--text-muted);">${player.bets} ставок</div>
                        </div>
                    </div>
                    <div class="leader-balance">${player.balance}</div>
                </div>
            `).join('');
        }

        function renderProfile() {
            // Генерируем градиент из имени
            const name = user.first_name || 'Player';
            const firstLetter = name.charAt(0).toUpperCase();
            
            // Получаем данные по user_id
            const myData = getMyData();
            
            // Цвета для градиента (разные для разных букв)
            const colors = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
                'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
                'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
                'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
                'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',
                'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
                'linear-gradient(135deg, #ff6e7f 0%, #bfe9ff 100%)'
            ];
            
            const colorIndex = firstLetter.charCodeAt(0) % colors.length;
            const gradient = colors[colorIndex];
            
            return `
                <div class="match-card">
                    <div style="text-align: center; margin-bottom: 24px;">
                        <div style="
                            width: 120px;
                            height: 120px;
                            border-radius: 50%;
                            background: ${gradient};
                            margin: 0 auto 16px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-size: 48px;
                            font-weight: 700;
                            color: white;
                            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
                        ">${firstLetter}</div>
                        <div style="font-size: 20px; font-weight: 700;">${name}</div>
                        <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">@${user.username || 'user'}</div>
                    </div>
                    <div style="display: grid; gap: 16px;">
                        <div style="display: flex; justify-content: space-between;">
                            <span style="color: var(--text-muted);">Место в рейтинге</span>
                            <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700;">#${myData.rank}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between;">
                            <span style="color: var(--text-muted);">Баланс</span>
                            <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700;">${myData.balance}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between;">
                            <span style="color: var(--text-muted);">Всего ставок</span>
                            <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700;">${myData.bets}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function openBetModal(matchId, teamId, teamName, odds) {
            currentBet = { matchId, teamId, teamName, odds };
            document.getElementById('modalHeader').textContent = `Ставка на ${teamName}`;
            document.getElementById('betAmount').value = '';
            document.getElementById('betModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('betModal').classList.remove('active');
        }

        function confirmBet() {
            const amount = parseInt(document.getElementById('betAmount').value);
            
            if (!amount || amount < 50) {
                tg.showAlert('Минимальная ставка: 50');
                return;
            }
            
            if (amount > getMyBalance()) {
                tg.showAlert('Недостаточно средств!');
                return;
            }
            
            const betData = {
                action: 'place_bet',
                match_id: currentBet.matchId,
                team_id: currentBet.teamId,
                amount: amount
            };
            
            tg.sendData(JSON.stringify(betData));
            closeModal();
        }

        init();
    </script>
</body>
</html>
