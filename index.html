<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARM BET</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --card-bg: #121212; --border: #1f1f1f; --text: #ffffff; --text-muted: #8a8a8a; --accent: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: 2px; display: flex; align-items: center; gap: 8px; }
        .logo img { width: 32px; height: 32px; object-fit: contain; }
        .balance { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
        .nav { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
        .nav-btn { padding: 12px 20px; background: none; border: none; color: var(--text-muted); font-size: 14px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .match-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .match-header { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .live-badge { color: #ff4444; font-weight: 700; }
        .match-teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .team { font-size: 16px; font-weight: 700; }
        .vs { font-size: 12px; color: var(--text-muted); }
        .odds-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .odds-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 16px; border-radius: 8px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'JetBrains Mono', monospace; position: relative; overflow: hidden; }
        .odds-btn:hover { border-color: var(--accent); background: var(--border); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,255,255,0.1); }
        .odds-btn:active { transform: translateY(0) scale(0.98); transition: all 0.1s; }
        .odds-btn::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255,255,255,0.1); transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; }
        .odds-btn:active::before { width: 300px; height: 300px; }
        .odds-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; position: relative; z-index: 1; }
        .odds-value { font-size: 20px; font-weight: 700; position: relative; z-index: 1; }
        .distribution { font-size: 11px; color: var(--text-muted); margin-top: 12px; }
        .distribution-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 8px 0; }
        .distribution-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
        .modal { display: flex; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0); z-index: 1000; padding: 20px; align-items: center; justify-content: center; pointer-events: none; transition: background 0.3s ease; }
        .modal.active { background: rgba(0,0,0,0.9); pointer-events: all; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; transform: scale(0.8) translateY(30px); opacity: 0; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal.active .modal-content { transform: scale(1) translateY(0); opacity: 1; }
        .modal-header { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; display: block; }
        .input { width: 100%; padding: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; font-family: 'JetBrains Mono', monospace; }
        .btn { width: 100%; padding: 16px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); margin-top: 12px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .bet-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 12px; }
        .bet-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .bet-team-info { flex: 1; }
        .bet-team-name { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
        .bet-match-id { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .bet-status { font-size: 10px; padding: 6px 10px; border-radius: 6px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; }
        .bet-status.active { background: #1a4d2e; color: #4ade80; }
        .bet-status.won { background: #1a4d2e; color: #4ade80; }
        .bet-status.lost { background: #4d1a1a; color: #ff6b6b; }
        .bet-details { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .bet-detail-item { }
        .bet-detail-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .bet-detail-value { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; }
        .leader-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .leader-rank { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: var(--text-muted); width: 40px; }
        .leader-name { font-weight: 700; }
        .leader-balance { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="logo.png" alt="ARM BET" onerror="this.style.display='none'">
            <span>ARM BET</span>
        </div>
        <div class="balance" id="userBalance">...</div>
    </div>

    <div class="nav">
        <button class="nav-btn active" data-view="matches">Матчи</button>
        <button class="nav-btn" data-view="bets">Ставки</button>
        <button class="nav-btn" data-view="leaderboard">Лидеры</button>
        <button class="nav-btn" data-view="profile">Профиль</button>
    </div>

    <div id="content"></div>

    <div id="betModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="modalHeader">Сделать ставку</div>
            <div class="input-group">
                <label class="input-label">Сумма ставки</label>
                <input type="number" class="input" id="betAmount" placeholder="Введите сумму">
            </div>
            <button class="btn" onclick="confirmBet()">Сделать ставку</button>
            <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <script>
        // Сгенерировано: 2026-03-10 14:40:01
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ПОЛУЧАЕМ USER_ID ИЗ URL ПАРАМЕТРА (передаёт бот)
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('user_id');
        
        // Пробуем получить из Telegram
        const telegramUser = tg.initDataUnsafe.user || null;
        
        // Определяем текущего пользователя
        let currentUserId = null;
        if (urlUserId) {
            currentUserId = parseInt(urlUserId);
            console.log('User ID из URL:', currentUserId);
        } else if (telegramUser && telegramUser.id !== 123456) {
            currentUserId = telegramUser.id;
            console.log('User ID из Telegram:', currentUserId);
        }

        // ДАННЫЕ ИЗ БАЗЫ
        const matchesData = [];
        const userData = {
            "balance": 500,
            "bets_count": 0
};
        const leaderboardData = [
            {
                        "rank": 1,
                        "username": "homixidehomixide555opiumopium",
                        "user_id": 6611491689,
                        "balance": 500,
                        "bets": 0
            },
            {
                        "rank": 2,
                        "username": "opium555YVL",
                        "user_id": 8004750966,
                        "balance": 500,
                        "bets": 0
            },
            {
                        "rank": 3,
                        "username": "armagedonbet_bot",
                        "user_id": 8596574713,
                        "balance": 500,
                        "bets": 0
            }
];
        const allBetsData = [];

        // Если всё равно не получили ID - используем первого из базы
        if (!currentUserId && leaderboardData && leaderboardData.length > 0) {
            currentUserId = leaderboardData[0].user_id;
            console.log('User ID не передан, используем первого:', currentUserId);
        }

        let currentBet = {};

        function init() {
            updateBalance();
            renderView('matches');
            setupEventListeners();
        }

        function setupEventListeners() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderView(btn.dataset.view);
                });
            });
        }

        function updateBalance() {
            const myData = leaderboardData.find(p => p.user_id === currentUserId);
            const balance = myData ? myData.balance : 500;
            document.getElementById('userBalance').textContent = balance;
        }
        
        function getMyBalance() {
            const myData = leaderboardData.find(p => p.user_id === currentUserId);
            return myData ? myData.balance : 500;
        }
        
        function getMyData() {
            const myData = leaderboardData.find(p => p.user_id === currentUserId);
            return myData || { balance: 500, bets: 0, rank: '—', username: 'Player' };
        }

        function renderView(view) {
            const content = document.getElementById('content');
            switch(view) {
                case 'matches': content.innerHTML = renderMatches(); break;
                case 'bets': content.innerHTML = renderMyBets(); break;
                case 'leaderboard': content.innerHTML = renderLeaderboard(); break;
                case 'profile': content.innerHTML = renderProfile(); break;
            }
        }

        function renderMatches() {
            if (!matchesData || matchesData.length === 0) {
                return '<div class="empty-state"><div class="empty-text">Нет доступных матчей</div></div>';
            }
            
            return matchesData.map(match => `
                <div class="match-card">
                    <div class="match-header">
                        <span>${match.league}</span>
                        ${match.status === 'live' ? '<span class="live-badge">● В ЭФИРЕ</span>' : ''}
                    </div>
                    <div class="match-teams">
                        <div class="team">${match.team1.emoji || ''} ${match.team1.name}</div>
                        <div class="vs">VS</div>
                        <div class="team">${match.team2.emoji || ''} ${match.team2.name}</div>
                    </div>
                    <div class="odds-row">
                        <button class="odds-btn" onclick="openBetModal(${match.match_id}, ${match.team1.team_id}, '${(match.team1.emoji || '') + ' ' + match.team1.name}', ${match.odds1})">
                            <div class="odds-label">W1</div>
                            <div class="odds-value">${match.odds1}</div>
                        </button>
                        <button class="odds-btn" onclick="openBetModal(${match.match_id}, ${match.team2.team_id}, '${(match.team2.emoji || '') + ' ' + match.team2.name}', ${match.odds2})">
                            <div class="odds-label">W2</div>
                            <div class="odds-value">${match.odds2}</div>
                        </button>
                    </div>
                    <div style="font-size: 10px; color: var(--text-muted); text-align: center; margin: 8px 0;">
                        ⚠️ Коэффициенты обновляются каждые 5 мин. При ставке фиксируется текущий коэф.
                    </div>
                    <div class="distribution">РАСПРЕДЕЛЕНИЕ</div>
                    <div class="distribution-bar">
                        <div class="distribution-fill" style="width: ${match.bet_distribution.team1}%"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted);">
                        <span>${match.bet_distribution.team1}%</span>
                        <span>${match.bet_distribution.team2}%</span>
                    </div>
                </div>
            `).join('');
        }

        function renderMyBets() {
            const myBetsData = allBetsData.filter(bet => bet.user_id === currentUserId);
            
            if (!myBetsData || myBetsData.length === 0) {
                return '<div class="empty-state"><div class="empty-text">У вас пока нет ставок</div></div>';
            }
            
            return myBetsData.map(bet => {
                const statusText = bet.status === 'active' ? 'Активна' : bet.status === 'won' ? 'Выигрыш' : 'Проигрыш';
                const potential = Math.round(bet.amount * bet.odds);
                
                return `
                <div class="bet-card">
                    <div class="bet-header">
                        <div class="bet-team-info">
                            <div class="bet-team-name">${bet.team}</div>
                            <div class="bet-match-id">Матч #${bet.match_id}</div>
                        </div>
                        <span class="bet-status ${bet.status}">${statusText}</span>
                    </div>
                    <div class="bet-details">
                        <div class="bet-detail-item">
                            <div class="bet-detail-label">Ставка</div>
                            <div class="bet-detail-value">${bet.amount}</div>
                        </div>
                        <div class="bet-detail-item">
                            <div class="bet-detail-label">Коэфф</div>
                            <div class="bet-detail-value">x${bet.odds}</div>
                        </div>
                        <div class="bet-detail-item">
                            <div class="bet-detail-label">${bet.status === 'won' ? 'Выигрыш' : bet.status === 'lost' ? 'Потеря' : 'Потенциал'}</div>
                            <div class="bet-detail-value">${potential}</div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function renderLeaderboard() {
            if (!leaderboardData || leaderboardData.length === 0) {
                return '<div class="empty-state"><div class="empty-text">Таблица лидеров пуста</div></div>';
            }
            
            const top10 = leaderboardData.slice(0, 10);
            
            return top10.map(player => `
                <div class="leader-card" style="${player.user_id === currentUserId ? 'border: 2px solid var(--accent);' : ''}">
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div class="leader-rank">${player.rank}</div>
                        <div>
                            <div class="leader-name">${player.username}</div>
                            <div style="font-size: 12px; color: var(--text-muted);">${player.bets} ставок</div>
                        </div>
                    </div>
                    <div class="leader-balance">${player.balance}</div>
                </div>
            `).join('');
        }

        function renderProfile() {
            const myData = getMyData();
            const name = myData.username || 'Player';
            const firstLetter = name.charAt(0).toUpperCase();
            
            const colors = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
                'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
                'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
                'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
                'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',
                'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
                'linear-gradient(135deg, #ff6e7f 0%, #bfe9ff 100%)'
            ];
            
            const colorIndex = firstLetter.charCodeAt(0) % colors.length;
            const gradient = colors[colorIndex];
            
            return `
                <div class="match-card">
                    <div style="text-align: center; margin-bottom: 24px;">
                        <div style="width: 120px; height: 120px; border-radius: 50%; background: ${gradient}; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 700; color: white; box-shadow: 0 8px 32px rgba(0,0,0,0.3);">${firstLetter}</div>
                        <div style="font-size: 20px; font-weight: 700;">${name}</div>
                    </div>
                    <div style="display: grid; gap: 16px;">
                        <div style="display: flex; justify-content: space-between;">
                            <span style="color: var(--text-muted);">Место в рейтинге</span>
                            <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700;">#${myData.rank}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between;">
                            <span style="color: var(--text-muted);">Баланс</span>
                            <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700;">${myData.balance}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between;">
                            <span style="color: var(--text-muted);">Всего ставок</span>
                            <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700;">${myData.bets}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function openBetModal(matchId, teamId, teamName, odds) {
            currentBet = { matchId, teamId, teamName, odds };
            document.getElementById('modalHeader').textContent = `Ставка на ${teamName}`;
            document.getElementById('betAmount').value = '';
            document.getElementById('betModal').classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('betModal');
            modal.querySelector('.modal-content').style.transform = 'scale(0.7) translateY(50px)';
            modal.querySelector('.modal-content').style.opacity = '0';
            setTimeout(() => {
                modal.classList.remove('active');
                modal.querySelector('.modal-content').style.transform = '';
                modal.querySelector('.modal-content').style.opacity = '';
            }, 300);
        }

        function confirmBet() {
            const amount = parseInt(document.getElementById('betAmount').value);
            
            if (!amount || amount < 50) {
                tg.showAlert('Минимальная ставка: 50');
                return;
            }
            
            if (amount > getMyBalance()) {
                tg.showAlert('Недостаточно средств!');
                return;
            }
            
            const betData = {
                action: 'place_bet',
                match_id: currentBet.matchId,
                team_id: currentBet.teamId,
                amount: amount
            };
            
            tg.sendData(JSON.stringify(betData));
            closeModal();
        }

        init();
    </script>
</body>
</html>
